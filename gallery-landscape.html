<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landscape · Linchuan Chen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b; --bg-2: #111113; --bg-3: #1a1a1c;
            --text: #f0ede8; --text-2: #a09890; --text-3: #5a5550;
            --gold: #c9a96e; --gold-l: #e5c88d;
            --rule: rgba(255,255,255,0.07);
            --ease: cubic-bezier(0.22,1,0.36,1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        body { cursor: url('badminton-MOUSE.png') 16 16, auto; min-height: 100vh; }
        a { color: inherit; text-decoration: none; }

        #progress {
            position: fixed; top: 0; left: 0; height: 2px;
            background: linear-gradient(90deg, var(--gold-l), var(--gold));
            width: 0; z-index: 2000; transition: width 0.1s linear;
            pointer-events: none;
        }

        #nav {
            position: sticky; top: 0; z-index: 500;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 52px; height: 68px;
            background: rgba(9,9,11,0.94); backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--rule);
        }
        .nav-back {
            font-size: 0.7rem; letter-spacing: 2.5px; text-transform: uppercase;
            color: var(--text-2); transition: color 0.2s;
            display: flex; align-items: center; gap: 8px;
        }
        .nav-back:hover { color: var(--gold); }
        .nav-title {
            position: absolute; left: 50%; transform: translateX(-50%);
            font-family: 'Playfair Display', serif;
            font-size: 1rem; font-style: italic; color: var(--text-2);
            letter-spacing: 0.5px; pointer-events: none;
        }
        .lang-sw { display: flex; align-items: center; gap: 4px; }
        .l-btn {
            font-size: 0.75rem; letter-spacing: 1.5px; font-weight: 600;
            color: var(--text-2); background: transparent;
            border: 1px solid var(--text-3); padding: 6px 13px;
            border-radius: 2px; cursor: pointer;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
            text-transform: uppercase; font-family: 'Inter', sans-serif;
        }
        .l-btn.active { color: var(--gold); border-color: var(--gold); background: rgba(201,169,110,0.08); }
        .l-pipe { font-size: 0.55rem; color: var(--text-3); user-select: none; }

        .page-hero {
            padding: 88px 56px 64px;
            border-bottom: 1px solid var(--rule);
            position: relative; overflow: hidden;
        }
        .page-hero::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse 55% 90% at 85% 50%, rgba(201,169,110,0.055) 0%, transparent 65%);
            pointer-events: none;
        }
        .page-hero-num {
            position: absolute; right: 5%; top: 50%; transform: translateY(-50%);
            font-family: 'Playfair Display', serif;
            font-size: clamp(6rem, 14vw, 14rem);
            font-weight: 900; color: rgba(201,169,110,0.04);
            letter-spacing: -4px; line-height: 1; pointer-events: none;
            user-select: none;
        }
        .page-seq {
            font-size: 0.62rem; letter-spacing: 3.5px; text-transform: uppercase;
            color: var(--gold); margin-bottom: 22px;
        }
        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 7vw, 7rem);
            font-weight: 900; line-height: 0.9; letter-spacing: -2.5px;
            color: var(--text); margin-bottom: 30px;
        }
        .page-title em { font-style: italic; color: var(--gold); }
        .page-meta {
            font-size: 0.78rem; color: var(--text-3);
            letter-spacing: 1.5px; display: flex; align-items: center; gap: 16px;
        }
        .page-meta-sep { opacity: 0.4; }

        .filter-bar {
            padding: 0 52px; height: 54px;
            display: flex; align-items: center; gap: 2px;
            border-bottom: 1px solid var(--rule);
            position: sticky; top: 68px; z-index: 400;
            background: rgba(9,9,11,0.96); backdrop-filter: blur(14px);
        }
        .f-btn {
            font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase;
            color: var(--text-3); background: transparent; border: none;
            padding: 8px 18px; cursor: pointer;
            font-family: 'Inter', sans-serif; font-weight: 500;
            transition: color 0.2s, background 0.2s; border-radius: 2px;
        }
        .f-btn:hover { color: var(--text-2); }
        .f-btn.active { color: var(--gold); background: rgba(201,169,110,0.07); }

        .grid-wrap { padding: 40px 52px 20px; min-height: 60vh; }
        .photo-grid { columns: 4 200px; column-gap: 10px; }
        .photo-card {
            break-inside: avoid; margin-bottom: 10px;
            position: relative; overflow: hidden; cursor: pointer;
            background: var(--bg-3);
        }
        .photo-card img {
            display: block; width: 100%; height: auto;
            transition: transform 0.6s var(--ease), filter 0.4s;
            filter: brightness(0.86);
        }
        .photo-card:hover img { transform: scale(1.05); filter: brightness(1); }
        .photo-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 22px 12px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.72));
            opacity: 0; transition: opacity 0.3s;
        }
        .photo-card:hover .photo-overlay { opacity: 1; }
        .photo-loc {
            font-size: 0.65rem; letter-spacing: 1.5px;
            text-transform: uppercase; color: var(--text-2);
        }
        .photo-wm {
            position: absolute; top: 8px; right: 8px;
            font-size: 0.58rem; letter-spacing: 1.5px;
            color: rgba(201,169,110,0.55); font-family: 'Playfair Display', serif;
            font-style: italic; opacity: 0; transition: opacity 0.3s;
            text-shadow: 0 1px 4px rgba(0,0,0,0.9);
        }
        .photo-card:hover .photo-wm { opacity: 1; }

        .no-results {
            text-align: center; padding: 80px 0;
            color: var(--text-3); font-size: 0.8rem; letter-spacing: 1px;
        }
        .load-more-wrap { text-align: center; padding: 20px 0 64px; }
        .load-more-btn {
            font-size: 0.68rem; letter-spacing: 3px; text-transform: uppercase;
            color: var(--gold); background: transparent;
            border: 1px solid rgba(201,169,110,0.32); padding: 14px 44px;
            cursor: pointer; font-family: 'Inter', sans-serif;
            transition: background 0.25s, border-color 0.25s;
        }
        .load-more-btn:hover { background: rgba(201,169,110,0.07); border-color: var(--gold); }

        .page-footer {
            border-top: 1px solid var(--rule);
            padding: 28px 52px;
            display: flex; align-items: center; justify-content: space-between;
            color: var(--text-3); font-size: 0.68rem; letter-spacing: 1px;
        }
        .footer-back { transition: color 0.2s; }
        .footer-back:hover { color: var(--gold); }

        .lightbox {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(5,5,6,0.97);
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }
        .lightbox.open { display: flex; }
        .lb-close {
            position: absolute; top: 22px; right: 26px;
            background: transparent; border: none; color: var(--text-2);
            font-size: 1rem; cursor: pointer; width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; transition: color 0.2s, background 0.2s;
        }
        .lb-close:hover { color: var(--text); background: rgba(255,255,255,0.06); }
        .lb-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: transparent; border: none; color: var(--text-3);
            font-size: 2.6rem; cursor: pointer; padding: 20px 16px;
            transition: color 0.2s; user-select: none; z-index: 5;
        }
        .lb-nav:hover { color: var(--gold); }
        .lb-prev { left: 4px; }
        .lb-next { right: 4px; }
        .lb-img-wrap {
            max-width: min(88vw, 1120px); max-height: 86vh;
            display: flex; align-items: center; justify-content: center;
        }
        .lb-img-wrap img { max-width: 100%; max-height: 86vh; object-fit: contain; display: block; }
        .lb-info {
            position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
            text-align: center; pointer-events: none;
        }
        .lb-loc { font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-3); }
        .lb-counter { font-size: 0.62rem; letter-spacing: 1px; color: var(--text-3); margin-top: 4px; }
        .lb-wm {
            position: absolute; bottom: 20px; right: 24px;
            display: flex; align-items: center; gap: 8px; pointer-events: none;
        }
        .lb-wm-ring img {
            width: 30px; height: 30px; border-radius: 50%;
            object-fit: cover; border: 1px solid rgba(201,169,110,0.28);
            filter: brightness(0.72);
        }
        .lb-wm-name {
            font-size: 0.6rem; letter-spacing: 2px;
            color: rgba(201,169,110,0.42);
            font-family: 'Playfair Display', serif; font-style: italic;
        }

        @media (max-width: 900px) {
            #nav, .filter-bar, .page-hero, .grid-wrap, .page-footer { padding-left: 24px; padding-right: 24px; }
            .nav-title { display: none; }
            .photo-grid { columns: 2 140px; }
        }
        @media (max-width: 480px) {
            .photo-grid { columns: 1; }
            .page-title { font-size: 3rem; }
        }
    </style>
</head>
<body>

<div id="progress"></div>

<header id="nav">
    <a href="gallery.html" class="nav-back" data-i18n="nav.back">← Gallery</a>
    <span class="nav-title">Landscape</span>
    <div class="lang-sw">
        <button class="l-btn" id="lEn" onclick="setLang('en')">EN</button>
        <span class="l-pipe">|</span>
        <button class="l-btn" id="lCn" onclick="setLang('cn')">中</button>
    </div>
</header>

<div class="page-hero">
    <div class="page-hero-num">02</div>
    <div class="page-seq">02 · Photography</div>
    <h1 class="page-title">
        <span data-i18n="h.t1">Land</span><br>
        <em data-i18n="h.t2">scape</em>
    </h1>
    <div class="page-meta">
        <span data-i18n="h.count">69 photographs</span>
        <span class="page-meta-sep">·</span>
        <span data-i18n="h.loc">Michigan, Heyuan, Yunnan, Chongqing &amp; NYC</span>
    </div>
</div>

<div class="filter-bar">
    <button class="f-btn active" data-sub="all"          onclick="filterSub('all',this)"          data-i18n="f.all">All</button>
    <button class="f-btn"        data-sub="US_MI"        onclick="filterSub('US_MI',this)"        data-i18n="f.mi">Michigan</button>
    <button class="f-btn"        data-sub="HeYuan-河源"  onclick="filterSub('HeYuan-河源',this)"  data-i18n="f.hy">Heyuan</button>
    <button class="f-btn"        data-sub="YuanNan-云南" onclick="filterSub('YuanNan-云南',this)" data-i18n="f.yn">Yunnan</button>
    <button class="f-btn"        data-sub="ChongQing-重庆" onclick="filterSub('ChongQing-重庆',this)" data-i18n="f.cq">Chongqing</button>
    <button class="f-btn"        data-sub="NYC-纽约"     onclick="filterSub('NYC-纽约',this)"     data-i18n="f.nyc">NYC</button>
</div>

<div class="grid-wrap">
    <div class="photo-grid" id="grid"></div>
    <div class="no-results" id="noResults" style="display:none" data-i18n="no.res">No photographs in this selection.</div>
</div>
<div class="load-more-wrap" id="loadMoreWrap" style="display:none">
    <button class="load-more-btn" onclick="loadPage()" data-i18n="btn.more">Load More</button>
</div>

<footer class="page-footer">
    <a href="gallery.html" class="footer-back" data-i18n="nav.back">← Gallery</a>
    <span data-i18n="f.copy">© 2026 Linchuan Chen</span>
</footer>

<div class="lightbox" id="lightbox" onclick="lbBgClick(event)">
    <button class="lb-close" onclick="closeLb()">✕</button>
    <button class="lb-nav lb-prev" onclick="lbMove(-1)">&#8249;</button>
    <button class="lb-nav lb-next" onclick="lbMove(1)">&#8250;</button>
    <div class="lb-img-wrap" id="lbImgWrap"></div>
    <div class="lb-info">
        <div class="lb-loc" id="lbLoc"></div>
        <div class="lb-counter" id="lbCounter"></div>
    </div>
    <div class="lb-wm">
        <div class="lb-wm-ring"><img src="Linchuan-WaterMark.jpg" alt="Linchuan Chen" loading="lazy"></div>
        <span class="lb-wm-name">Linchuan Chen</span>
    </div>
</div>

<script>
    const TRANS = {
        en: {
            'nav.back': '← Gallery',
            'h.t1': 'Land', 'h.t2': 'scape',
            'h.count': '69 photographs',
            'h.loc': 'Michigan, Heyuan, Yunnan, Chongqing & NYC',
            'f.all': 'All', 'f.mi': 'Michigan', 'f.hy': 'Heyuan', 'f.yn': 'Yunnan', 'f.cq': 'Chongqing', 'f.nyc': 'NYC',
            'btn.more': 'Load More',
            'no.res': 'No photographs in this selection.',
            'f.copy': '© 2026 Linchuan Chen'
        },
        cn: {
            'nav.back': '← 相册',
            'h.t1': '风景', 'h.t2': '摄影',
            'h.count': '69 张照片',
            'h.loc': '密歇根、河源、云南、重庆 & 纽约',
            'f.all': '全部', 'f.mi': '密歇根', 'f.hy': '河源', 'f.yn': '云南', 'f.cq': '重庆', 'f.nyc': '纽约',
            'btn.more': '加载更多',
            'no.res': '该分类暂无照片。',
            'f.copy': '© 2026 陈林川'
        }
    };
    const SUB_LOC = {
        'US_MI':          { en: 'Michigan, USA',   cn: '美国密歇根' },
        'HeYuan-河源':    { en: 'Heyuan, China',   cn: '中国河源' },
        'YuanNan-云南':   { en: 'Yunnan, China',   cn: '中国云南' },
        'ChongQing-重庆': { en: 'Chongqing, China', cn: '中国重庆' },
        'NYC-纽约':       { en: 'New York, USA',   cn: '美国纽约' }
    };

    let _lang = localStorage.getItem('site-lang') || 'en';

    function setLang(lang) {
        _lang = lang;
        localStorage.setItem('site-lang', lang);
        document.documentElement.lang = lang === 'cn' ? 'zh' : 'en';
        document.getElementById('lEn').classList.toggle('active', lang === 'en');
        document.getElementById('lCn').classList.toggle('active', lang === 'cn');
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const k = el.dataset.i18n;
            if (TRANS[lang][k] !== undefined) el.textContent = TRANS[lang][k];
        });
        document.title = lang === 'cn' ? '风景摄影 · 陈林川' : 'Landscape · Linchuan Chen';
    }

    const DATA = [
        { sub:'HeYuan-河源', files:['DSC_0271.jpg','DSC_0301.jpg','DSC_0380.jpg'] },
        { sub:'US_MI', files:[
            'Doge4.jpg','Doge4-2.jpg','Doge4-3.jpg','Doge4-4.jpg','Doge4-5.jpg',
            'Doge4-6.jpg','Doge4-7.jpg','Doge4-8.jpg','Doge4-9.jpg',
            'Doge4-10.jpg','Doge4-11.jpg','Doge4-12.jpg','Doge4-13.jpg','Doge4-14.jpg',
            'Doge4-15.jpg','Doge4-16.jpg','Doge4-17.jpg','Doge4-18.jpg','Doge4-19.jpg',
            'Doge4-20.jpg','Doge4-21.jpg','Doge4-22.jpg','Doge4-23.jpg','Doge4-24.jpg',
            'Doge4-25.jpg','Doge4-29.jpg',
            'IMG_5416.JPG','IMG_5451.JPG','IMG_6559.JPG','IMG_9281.JPG',
            'Sep-6-7.jpg','Sep-6-8.jpg',
            '001b10d5993e7d32b595a023653a3918.jpg','370374e65156e0373d8b56875d2ed6a1.jpg',
            '3f15d7634c2ab0215954f73330c04977.jpg','3ff48cfe6c6cc9f12ef119c282812aa4.jpg',
            '422708e720a7f3d781bac363c082132e.jpg','8b9150d1a0f3899a4ed232daaea9eddc.jpg',
            '98bc8bbc9aded3b62b062d3239ab0b2e.jpg','a5bdbbe0075d8c011ec5cb1877e91aa0.jpg',
            'd11fed2f676eb0906e4e3c327ab18f66.jpg','e55e99470f61dfba9fa94cb25ce3d4c5.jpg',
            'f1cb8ad668eb2beec404785a5f442b6d.jpg','f6fcf0d69c66273e9b9ceecb79a7f19d.jpg',
            'yueliang-com.bmp'
        ]},
        { sub:'YuanNan-云南', files:[
            'yunnan-12.jpg','yunnan-13.jpg','yunnan-65.jpg','yunnan-68.jpg','yunnan-69.jpg',
            'yunnan-70.jpg','yunnan-71.jpg','yunnan-72.jpg','yunnan-78.jpg','yunnan-79.jpg',
            'yunnan-80.jpg','yunnan-88.jpg','yunnan-89.jpg',
            '0be99acf1e6e817fb7863a9ef72a15bf.jpg','26d8ed25985c6cc52c2a8c05bf135be1.jpg',
            'dd5c32c6c21e41757e19ab3a243c6c00.jpg'
        ]},
        { sub:'ChongQing-重庆', files:[
            '6015f8c897ad29e198c64dcb39c26416.jpg','75685f2bedb7af8f6d301af8e3d2510f.jpg',
            '81a0c7b13b97a1129b93d0ca8f60c281.jpg','c99aa7ce494f731aeb08cddfe93724e9.jpg'
        ]},
        { sub:'NYC-纽约', files:['f28025f04df4c4a563a4113692e6ad2f.jpg'] }
    ];

    const ALL = [];
    DATA.forEach(g => g.files.forEach(f => ALL.push({
        sub: g.sub,
        src: `Landscape/${g.sub}/${f}`,
        file: f
    })));

    let activeSub = 'all', filteredImgs = [], pageOffset = 0;
    const PAGE_SIZE = 24;
    let lbIdx = 0, lbList = [];

    function filterSub(sub, btnEl) {
        activeSub = sub;
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        if (btnEl) btnEl.classList.add('active');
        renderGrid();
    }

    function renderGrid() {
        filteredImgs = activeSub === 'all' ? ALL.slice() : ALL.filter(i => i.sub === activeSub);
        pageOffset = 0;
        document.getElementById('grid').innerHTML = '';
        document.getElementById('noResults').style.display = filteredImgs.length === 0 ? '' : 'none';
        lbList = filteredImgs;
        loadPage();
    }

    function loadPage() {
        const batch = filteredImgs.slice(pageOffset, pageOffset + PAGE_SIZE);
        const grid  = document.getElementById('grid');
        batch.forEach((img, i) => {
            const idx  = pageOffset + i;
            const card = document.createElement('div');
            card.className = 'photo-card';
            card.onclick   = () => openLb(idx);
            const loc = (SUB_LOC[img.sub] || {})[_lang] || img.sub;
            card.innerHTML = `<img src="${img.src}" alt="${img.file}" loading="${pageOffset === 0 && i < 8 ? 'eager' : 'lazy'}"
                onerror="this.closest('.photo-card').style.display='none'">
                <div class="photo-overlay"><div class="photo-loc">${loc}</div></div>
                <div class="photo-wm">Linchuan Chen</div>`;
            grid.appendChild(card);
        });
        pageOffset += batch.length;
        document.getElementById('loadMoreWrap').style.display = pageOffset < filteredImgs.length ? '' : 'none';
    }

    function openLb(idx) {
        lbIdx = idx; showLbImg();
        document.getElementById('lightbox').classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function showLbImg() {
        const img = lbList[lbIdx];
        document.getElementById('lbImgWrap').innerHTML  = `<img src="${img.src}" alt="${img.file}">`;
        document.getElementById('lbLoc').textContent    = (SUB_LOC[img.sub] || {})[_lang] || img.sub;
        document.getElementById('lbCounter').textContent = `${lbIdx + 1} / ${lbList.length}`;
    }
    function lbMove(dir) { lbIdx = (lbIdx + dir + lbList.length) % lbList.length; showLbImg(); }
    function closeLb() { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow = ''; }
    function lbBgClick(e) { if (e.target === document.getElementById('lightbox')) closeLb(); }
    document.addEventListener('keydown', e => {
        if (!document.getElementById('lightbox').classList.contains('open')) return;
        if (e.key === 'ArrowRight') lbMove(1);
        if (e.key === 'ArrowLeft')  lbMove(-1);
        if (e.key === 'Escape')     closeLb();
    });

    const progressBar = document.getElementById('progress');
    window.addEventListener('scroll', () => {
        const y = window.scrollY, total = document.documentElement.scrollHeight - window.innerHeight;
        if (total > 0) progressBar.style.width = `${(y / total) * 100}%`;
    }, { passive: true });

    setLang(_lang);
    renderGrid();
</script>
</body>
</html>
