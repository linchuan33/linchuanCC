<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery — Linchuan Chen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ─────────────────────────────────────
           TOKENS (mirror index.html)
        ───────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:     #09090b;
            --bg-2:   #111113;
            --bg-3:   #1a1a1d;
            --gold:   #c9a96e;
            --gold-l: #e5c88d;
            --gold-d: rgba(201,169,110,0.10);
            --text:   #f0ede8;
            --text-2: #9a9080;
            --text-3: #4a4540;
            --rule:   rgba(201,169,110,0.16);
            --ease:   cubic-bezier(0.16, 1, 0.3, 1);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            cursor: url('badminton-MOUSE.png') 16 16, auto;
        }

        /* ─────────────────────────────────────
           SCROLL PROGRESS
        ───────────────────────────────────── */
        #progress {
            position: fixed;
            top: 0; left: 0;
            height: 2px; width: 0%;
            background: linear-gradient(90deg, var(--gold-l), var(--gold));
            z-index: 9999;
            pointer-events: none;
        }

        /* ─────────────────────────────────────
           STICKY HEADER
        ───────────────────────────────────── */
        .header {
            position: sticky;
            top: 0;
            z-index: 800;
            background: rgba(9,9,11,0.94);
            backdrop-filter: blur(22px);
            border-bottom: 1px solid var(--rule);
        }

        .header-top {
            display: flex;
            align-items: center;
            padding: 0 52px;
            height: 68px;
            gap: 24px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-2);
            text-decoration: none;
            padding: 8px 0;
            border-bottom: 1px solid var(--text-3);
            transition: color 0.25s, border-color 0.25s;
            flex-shrink: 0;
        }
        .back-btn:hover { color: var(--gold); border-color: var(--gold); }
        .back-btn svg { transition: transform 0.25s var(--ease); }
        .back-btn:hover svg { transform: translateX(-4px); }

        .header-divider {
            width: 1px;
            height: 22px;
            background: var(--rule);
            flex-shrink: 0;
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            flex: 1;
        }
        .header-title em {
            font-style: italic;
            color: var(--gold);
        }

        .header-wm {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .header-wm img {
            width: 28px; height: 28px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--rule);
            opacity: 0.75;
        }
        .header-wm-name {
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            color: var(--text-3);
            text-transform: uppercase;
        }

        /* Filter row */
        .filter-bar {
            padding: 0 52px;
            border-top: 1px solid rgba(201,169,110,0.08);
            display: flex;
            align-items: center;
            gap: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .filter-bar::-webkit-scrollbar { display: none; }

        .filter-sep {
            font-size: 0.64rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-3);
            padding: 14px 20px 14px 0;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .f-btn {
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-2);
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 14px 18px;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            flex-shrink: 0;
            transition: color 0.22s, border-color 0.22s;
        }
        .f-btn:hover { color: var(--gold-l); }
        .f-btn.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        .filter-divider {
            width: 1px;
            height: 14px;
            background: var(--rule);
            margin: 0 8px;
            flex-shrink: 0;
        }

        /* ─────────────────────────────────────
           GALLERY BODY
        ───────────────────────────────────── */
        .gallery-body {
            padding: 48px 52px 80px;
        }

        /* Stats row */
        .gallery-meta {
            display: flex;
            align-items: baseline;
            gap: 24px;
            margin-bottom: 36px;
        }
        .meta-count {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
        }
        .meta-label {
            font-size: 0.68rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-3);
        }

        /* Masonry grid */
        .photo-grid {
            columns: 3 260px;
            column-gap: 14px;
        }

        .photo-card {
            break-inside: avoid;
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
            border-radius: 2px;
            border: 1px solid rgba(201,169,110,0.07);
            cursor: pointer;
            display: block;
        }

        .photo-card img {
            width: 100%;
            display: block;
            transition: transform 0.55s var(--ease), filter 0.55s;
            filter: brightness(0.92);
        }
        .photo-card:hover img {
            transform: scale(1.04);
            filter: brightness(1.0);
        }

        /* Hover overlay */
        .photo-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.4s;
            display: flex;
            align-items: flex-end;
            padding: 16px;
        }
        .photo-card:hover .photo-overlay { opacity: 1; }

        .photo-loc {
            font-size: 0.64rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
        }

        /* Watermark stamp on each photo */
        .photo-wm {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: url('Linchuan-WaterMark.jpg') center/cover no-repeat;
            opacity: 0;
            transition: opacity 0.4s;
            border: 1px solid rgba(255,255,255,0.25);
            pointer-events: none;
        }
        .photo-card:hover .photo-wm { opacity: 0.5; }

        /* Gold border on hover */
        .photo-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 1px solid rgba(201,169,110,0);
            border-radius: 2px;
            transition: border-color 0.35s;
            pointer-events: none;
        }
        .photo-card:hover::after { border-color: rgba(201,169,110,0.45); }

        .no-results {
            text-align: center;
            padding: 100px 20px;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--text-3);
            font-size: 1.2rem;
        }

        /* ─────────────────────────────────────
           LIGHTBOX
        ───────────────────────────────────── */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(5,5,7,0.96);
            backdrop-filter: blur(16px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .lightbox.open { opacity: 1; pointer-events: all; }

        .lb-img-wrap {
            position: relative;
            max-width: 90vw;
            max-height: 88vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #lbImg {
            max-width: 90vw;
            max-height: 86vh;
            object-fit: contain;
            border-radius: 1px;
            display: block;
            transform: scale(0.96);
            transition: transform 0.32s var(--ease);
        }
        .lightbox.open #lbImg { transform: scale(1); }

        /* Watermark in lightbox corner */
        .lb-wm {
            position: absolute;
            bottom: 14px;
            right: 14px;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: url('Linchuan-WaterMark.jpg') center/cover no-repeat;
            opacity: 0.35;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
        }

        .lb-close {
            position: absolute;
            top: 24px; right: 24px;
            width: 40px; height: 40px;
            border-radius: 2px;
            border: 1px solid var(--text-3);
            background: transparent;
            color: var(--text-2);
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, color 0.2s;
            z-index: 10;
        }
        .lb-close:hover { border-color: var(--gold); color: var(--gold); }

        .lb-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px; height: 48px;
            border-radius: 2px;
            border: 1px solid var(--text-3);
            background: rgba(9,9,11,0.6);
            color: var(--text-2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: border-color 0.22s, color 0.22s, background 0.22s;
            z-index: 10;
        }
        .lb-nav:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,169,110,0.08); }
        .lb-prev { left: 20px; }
        .lb-next { right: 20px; }

        .lb-info {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            white-space: nowrap;
        }
        .lb-info-cat {
            font-size: 0.62rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 4px;
        }
        .lb-info-counter {
            font-size: 0.68rem;
            letter-spacing: 1.5px;
            color: var(--text-3);
        }

        /* ─────────────────────────────────────
           FOOTER (minimal, mirrors main site)
        ───────────────────────────────────── */
        .footer {
            background: var(--bg);
            border-top: 1px solid var(--rule);
            padding: 48px 52px 36px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            flex-wrap: wrap;
        }

        .footer-sig {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .footer-sig img {
            width: 44px; height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--rule);
            filter: brightness(0.85);
        }
        .footer-sig-name {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }
        .footer-sig-cn {
            font-family: 'Playfair Display', serif;
            font-size: 0.78rem;
            font-style: italic;
            color: var(--gold);
        }

        .footer-copy {
            font-size: 0.64rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-3);
        }

        /* ─────────────────────────────────────
           RESPONSIVE
        ───────────────────────────────────── */
        @media (max-width: 700px) {
            .header-top, .filter-bar, .gallery-body { padding-left: 20px; padding-right: 20px; }
            .photo-grid { columns: 2 140px; }
            .header-wm-name { display: none; }
            .footer { padding: 36px 20px; }
        }
        @media (max-width: 440px) {
            .photo-grid { columns: 1; }
        }
    </style>
</head>
<body>

    <div id="progress"></div>

    <!-- ══════════════════════════════════════
         STICKY HEADER
    ══════════════════════════════════════ -->
    <header class="header">
        <div class="header-top">
            <a href="index.html" class="back-btn">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                Back
            </a>
            <div class="header-divider"></div>
            <div class="header-title">Moments of <em>Solitude</em></div>
            <div class="header-wm">
                <img src="Linchuan-WaterMark.jpg" alt="Linchuan Chen">
                <span class="header-wm-name">Linchuan Chen</span>
            </div>
        </div>

        <div class="filter-bar" id="filterBar">
            <span class="filter-sep">Category</span>
            <button class="f-btn active" onclick="filterCat('all',this)">All</button>
            <button class="f-btn" onclick="filterCat('CuteAnimal',this)">Cute Animals</button>
            <button class="f-btn" onclick="filterCat('Landscape',this)">Landscape</button>
            <button class="f-btn" onclick="filterCat('Portrait',this)">Portrait</button>
            <div class="filter-divider" id="subDivider" style="display:none;"></div>
            <!-- sub-filters injected by JS -->
        </div>
    </header>

    <!-- ══════════════════════════════════════
         GALLERY
    ══════════════════════════════════════ -->
    <main class="gallery-body">
        <div class="gallery-meta">
            <span class="meta-count" id="metaCount">—</span>
            <span class="meta-label" id="metaLabel">photographs</span>
        </div>
        <div class="photo-grid" id="grid"></div>
        <div class="no-results" id="noResults" style="display:none;">No photographs in this selection.</div>
    </main>

    <!-- ══════════════════════════════════════
         LIGHTBOX
    ══════════════════════════════════════ -->
    <div class="lightbox" id="lightbox" onclick="lbBgClick(event)">
        <button class="lb-close" onclick="closeLb()">✕</button>
        <button class="lb-nav lb-prev" onclick="lbMove(-1)">&#8249;</button>
        <div class="lb-img-wrap">
            <img id="lbImg" src="" alt="">
            <div class="lb-wm"></div>
        </div>
        <button class="lb-nav lb-next" onclick="lbMove(1)">&#8250;</button>
        <div class="lb-info">
            <div class="lb-info-cat" id="lbCat"></div>
            <div class="lb-info-counter" id="lbCount"></div>
        </div>
    </div>

    <!-- ══════════════════════════════════════
         FOOTER
    ══════════════════════════════════════ -->
    <footer class="footer">
        <div class="footer-sig">
            <img src="Linchuan-WaterMark.jpg" alt="Linchuan Chen">
            <div class="footer-sig-text">
                <div class="footer-sig-name">Linchuan Chen</div>
                <div class="footer-sig-cn">年糕的编程花园</div>
            </div>
        </div>
        <div class="footer-copy">© 2026 Linchuan Chen · All rights reserved</div>
    </footer>

    <!-- ══════════════════════════════════════
         DATA + LOGIC
    ══════════════════════════════════════ -->
    <script>
        document.body.style.cursor = "url('badminton-MOUSE.png') 16 16, auto";

        /* ── scroll progress ── */
        window.addEventListener('scroll', () => {
            const t = document.documentElement.scrollHeight - window.innerHeight;
            document.getElementById('progress').style.width = `${(window.scrollY / t) * 100}%`;
        }, { passive: true });

        /* ══════════════════════════════════════
           GALLERY DATA
        ══════════════════════════════════════ */
        const DATA = [
            { cat:'CuteAnimal', sub:'US_MI',        loc:'Michigan, USA',  files:['DSC_0385.jpg','IMG_5417.JPG','IMG_5418.JPG','IMG_5419.JPG','IMG_5448.JPG','IMG_5563.JPG','IMG_5656.JPG','IMG_5657.JPG','IMG_5658.JPG','IMG_5659.JPG','IMG_5660.JPG','IMG_5661.JPG','IMG_5662.JPG','IMG_5663.JPG','IMG_5664.JPG','IMG_5665.JPG','IMG_5666.JPG','IMG_5667.JPG','IMG_5668.JPG','IMG_5669.JPG','IMG_5670.JPG','IMG_5671.JPG','IMG_5672.JPG','IMG_5673.JPG','IMG_5674.JPG','IMG_6239.JPG','IMG_6240.JPG','IMG_6560.JPG','IMG_6561.JPG','IMG_6562.JPG','IMG_6563.JPG','IMG_6564.JPG','IMG_6565.JPG','IMG_6566.JPG','IMG_6568.JPG','IMG_6569.JPG','IMG_6830.JPG','IMG_6831.JPG','IMG_6832.JPG','IMG_6833.JPG','IMG_6834.JPG','IMG_7820.JPG','IMG_7822.JPG','IMG_7823.JPG','IMG_7824.JPG','IMG_7825.JPG','IMG_7826.JPG','IMG_7827.JPG','IMG_7832.JPG','IMG_7833.JPG','IMG_7834.JPG','IMG_7835.JPG','IMG_7836.JPG','IMG_8565.JPG','IMG_8566.JPG','IMG_8577.JPG','IMG_8578.JPG','IMG_8581.JPG','IMG_8582.JPG','IMG_9278.JPG','IMG_9279.JPG','IMG_9280.JPG','IMG_9282.JPG','IMG_9283.JPG','IMG_9284.JPG','IMG_9285.JPG','Sep-6-2.jpg','Sep-6-3.jpg','Sep-6-4.jpg','Sep-6.jpg','_DSC2034.JPG','_DSC2038.JPG','_DSC2043.JPG','_DSC2047.JPG','_DSC2048.JPG','_DSC2213.JPG'] },
            { cat:'CuteAnimal', sub:'YuanNan-云南', loc:'Yunnan, China',   files:['yunnan-98.jpg','yunnan-99.jpg','yunnan-100.jpg','yunnan-101.jpg','yunnan-102.jpg','yunnan-103.jpg','yunnan-104.jpg','yunnan-105.jpg','yunnan-106.jpg'] },
            { cat:'Landscape',  sub:'HeYuan-河源',  loc:'Heyuan, China',   files:['DSC_0271.jpg','DSC_0301.jpg','DSC_0380.jpg'] },
            { cat:'Landscape',  sub:'US_MI',        loc:'Michigan, USA',   files:['Doge4.jpg','Doge4-2.jpg','Doge4-3.jpg','Doge4-4.jpg','Doge4-5.jpg','Doge4-6.jpg','Doge4-7.jpg','Doge4-8.jpg','Doge4-9.jpg','Doge4-10.jpg','Doge4-11.jpg','Doge4-12.jpg','Doge4-13.jpg','Doge4-14.jpg','Doge4-15.jpg','Doge4-16.jpg','Doge4-17.jpg','Doge4-18.jpg','Doge4-19.jpg','Doge4-20.jpg','Doge4-21.jpg','Doge4-22.jpg','Doge4-23.jpg','Doge4-24.jpg','Doge4-25.jpg','Doge4-29.jpg','IMG_5416.JPG','IMG_5451.JPG','IMG_6559.JPG','IMG_9281.JPG','Sep-6-7.jpg','Sep-6-8.jpg'] },
            { cat:'Portrait',   sub:'HeYuan-河源',  loc:'Heyuan, China',   files:['07322bc636fb7c1c54422894aa37539d.JPG','0c0e22d5ebe046a43234071e1ee397e1.JPG','2753498bdd94337ce97ed605cf48c911.JPG','3084d41209de8513aec7bab57e970937.JPG','4085b42fa85ba4e13c7b7ed8a10dfe1f.JPG','4d04237993fff7e6453ef4a2a1088609.JPG','7361a53d43eae499db9020e3f47f90e9.JPG','76986524fc1248881ca446f0aa8ff2c2.JPG','82c742fe6f61ac8c0c3cb1ec8df405f8.JPG','875a1d8f5528a180a23ede4e2e5311fb.JPG','883b17d4d68b1574082baf045d897cd5.JPG','8b5767289c91451eb7043e1d1d37416c.JPG','IMG_0355.JPG','IMG_0356.JPG','IMG_0357.JPG','IMG_0358.JPG','IMG_0359.JPG','IMG_0360.JPG','IMG_0361.JPG','a6b679bd6f34b99c6371c0ba697c7032.JPG','aa1a629c237ee97ac3bc2e655418f556.JPG','d35cdd8446169ba6ab892b57fa9b4838.JPG','tangchao-9.jpg'] },
            { cat:'Portrait',   sub:'US_MI',        loc:'Michigan, USA',   files:['IMG_5564.JPG','_DSC0568.JPG'] }
        ];

        /* build flat list */
        const ALL = [];
        DATA.forEach(g => g.files.forEach(f => ALL.push({
            cat: g.cat, sub: g.sub, loc: g.loc,
            src: `${g.cat}/${g.sub}/${f}`,
            file: f
        })));

        const CAT_LABEL = { CuteAnimal:'Cute Animals', Landscape:'Landscape', Portrait:'Portrait' };
        const SUB_LABEL = { 'US_MI':'Michigan', 'YuanNan-云南':'Yunnan', 'HeYuan-河源':'Heyuan' };

        /* ── state ── */
        let activeCat = 'all';
        let activeSub = 'all';
        let lbIdx     = 0;
        let lbList    = [];

        /* ── render ── */
        function render() {
            const filtered = ALL.filter(img =>
                (activeCat === 'all' || img.cat === activeCat) &&
                (activeSub === 'all' || img.sub === activeSub)
            );
            lbList = filtered;

            const grid  = document.getElementById('grid');
            const none  = document.getElementById('noResults');
            const count = document.getElementById('metaCount');
            const label = document.getElementById('metaLabel');

            count.textContent = filtered.length;
            label.textContent = 'photograph' + (filtered.length !== 1 ? 's' : '');

            if (!filtered.length) {
                grid.innerHTML = '';
                none.style.display = '';
                return;
            }
            none.style.display = 'none';

            grid.innerHTML = filtered.map((img, i) =>
                `<div class="photo-card" onclick="openLb(${i})">
                    <img src="${img.src}" alt="${img.file}" loading="lazy"
                         onerror="this.closest('.photo-card').style.display='none'">
                    <div class="photo-overlay">
                        <div class="photo-loc">${img.loc}</div>
                    </div>
                    <div class="photo-wm"></div>
                </div>`
            ).join('');
        }

        /* ── category filter ── */
        function filterCat(cat, btn) {
            activeCat = cat;
            activeSub = 'all';

            document.querySelectorAll('#filterBar .f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            /* rebuild sub-filters */
            const divider = document.getElementById('subDivider');
            document.querySelectorAll('.sub-btn').forEach(b => b.remove());

            if (cat !== 'all') {
                const subs = [...new Set(DATA.filter(g => g.cat === cat).map(g => g.sub))];
                if (subs.length > 1) {
                    divider.style.display = '';
                    const allSub = mkSubBtn('All', 'all', true);
                    divider.after(allSub);
                    subs.forEach((s, i) => {
                        const b = mkSubBtn(SUB_LABEL[s] || s, s, false);
                        allSub.after(b);
                    });
                } else {
                    divider.style.display = 'none';
                }
            } else {
                divider.style.display = 'none';
            }

            render();
        }

        function mkSubBtn(label, sub, isActive) {
            const b = document.createElement('button');
            b.className = 'f-btn sub-btn' + (isActive ? ' active' : '');
            b.textContent = label;
            b.onclick = () => {
                activeSub = sub;
                document.querySelectorAll('.sub-btn').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                render();
            };
            return b;
        }

        /* ── lightbox ── */
        function openLb(i) {
            lbIdx = i;
            showLb();
            document.getElementById('lightbox').classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeLb() {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }
        function lbBgClick(e) {
            if (e.target === document.getElementById('lightbox')) closeLb();
        }
        function lbMove(dir) {
            lbIdx = (lbIdx + dir + lbList.length) % lbList.length;
            showLb();
        }
        function showLb() {
            const img = lbList[lbIdx];
            document.getElementById('lbImg').src = img.src;
            document.getElementById('lbImg').alt = img.file;
            document.getElementById('lbCat').textContent =
                `${CAT_LABEL[img.cat] || img.cat} · ${img.loc}`;
            document.getElementById('lbCount').textContent =
                `${lbIdx + 1} / ${lbList.length}`;
        }

        document.addEventListener('keydown', e => {
            if (!document.getElementById('lightbox').classList.contains('open')) return;
            if (e.key === 'ArrowRight') lbMove(1);
            if (e.key === 'ArrowLeft')  lbMove(-1);
            if (e.key === 'Escape')     closeLb();
        });

        /* init */
        render();
    </script>
</body>
</html>
